# mnn.yml
# GitHub Actions workflow to build MNN for Android API level 30 with OpenCL, Vulkan, FP16/32, and BF16 support
# Build only for arm64-v8a

name: Build MNN for Android API 30

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-android:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        abi: [arm64-v8a]   # Build only for 64-bit ARM
    steps:
      - name: Checkout MNN source
        uses: actions/checkout@v4
        with:
          repository: alibaba/MNN
          path: MNN

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build opencl-headers

      - name: Download Android NDK r29
        run: |
          wget -q https://googledownloads.cn/android/repository/android-ndk-r29-linux.zip
          unzip -q android-ndk-r29-linux.zip
          echo "ANDROID_NDK=$PWD/android-ndk-r29" >> $GITHUB_ENV

      - name: Configure CMake for ${{ matrix.abi }}
        run: |
          mkdir -p build-${{ matrix.abi }}
          cd build-${{ matrix.abi }}
          # Set base CMake arguments
          CMAKE_ARGS=(
            -G Ninja
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK/build/cmake/android.toolchain.cmake
            -DANDROID_ABI=${{ matrix.abi }}
            -DANDROID_PLATFORM=android-30
            -DANDROID_STL=c++_shared
            -DMNN_OPENCL=ON
            -DMNN_VULKAN=ON
            -DMNN_ARM82=ON                 # Enable FP16 for ARMv8.2 (arm64)
            -DMNN_SUPPORT_BF16=ON           # Enable BF16 support
            -DMNN_BUILD_SHARED_LIBS=ON
            -DMNN_SEP_BUILD=ON
            -DMNN_USE_SYSTEM_LIB=OFF        # Use dlopen for OpenCL/Vulkan
            -DMNN_BUILD_TRAIN=OFF
            -DMNN_BUILD_DEMO=OFF
            -DMNN_BUILD_TOOLS=OFF
            -DMNN_BUILD_CONVERTER=OFF
            -DMNN_BUILD_TEST=OFF
            -DMNN_BUILD_BENCHMARK=OFF
            -DMNN_BUILD_QUANTOOLS=OFF
          )
          # Run cmake with all arguments
          cmake "${CMAKE_ARGS[@]}" ../MNN

      - name: Build MNN
        run: |
          cd build-${{ matrix.abi }}
          ninja

      - name: Upload shared library
        uses: actions/upload-artifact@v4
        with:
          name: MNN-android-api30-${{ matrix.abi }}
          path: build-${{ matrix.abi }}/libMNN.so
